version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: neel
      POSTGRES_DB: blockchain_project
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  gateway:
    build: 
      context: ./gateway
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://neel@db:5432/blockchain_project
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: ./scheduler
    environment:
      - DATABASE_URL=postgresql://neel@db:5432/blockchain_project
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

volumes:
  pgdata:
