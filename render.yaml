services:
  # 1. PostgreSQL Database
  - type: database
    name: omni-db
    databaseName: omni_marketplace
    user: neel

  # 2. Redis for Job Queuing
  - type: redis
    name: omni-redis
    plan: free

  # 3. EVM API Gateway
  - type: web
    name: evm-gateway
    env: node
    rootDir: decentralized-ai-marketplace/gateway
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omni-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: omni-redis
          property: connectionString

  # 4. Solana API Gateway
  - type: web
    name: solana-gateway
    env: node
    rootDir: solana-ai-marketplace/gateway
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omni-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: omni-redis
          property: connectionString

  # 5. Job Scheduler
  - type: worker
    name: job-scheduler
    env: node
    rootDir: decentralized-ai-marketplace/scheduler
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omni-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: omni-redis
          property: connectionString

  # 6. AI Compute Worker
  - type: web
    name: ai-compute-worker
    env: python
    rootDir: decentralized-ai-marketplace/worker
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000

  # 7. Main Laravel Hub (The Brain)
  - type: web
    name: omni-hub-backend
    env: php
    plan: free
    buildCommand: composer install --no-dev && php artisan migrate --force
    startCommand: apache2-foreground
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: omni-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: omni-redis
          property: connectionString
