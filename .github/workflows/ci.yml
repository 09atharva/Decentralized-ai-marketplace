name: Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Generate key
      run: php artisan key:generate
    - name: Run Tests
      run: php artisan test

  build-marketplace-services:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Gateway
      run: cd decentralized-ai-marketplace/gateway && npm install && npm run build --if-present
    - name: Build Scheduler
      run: cd decentralized-ai-marketplace/scheduler && npm install
    - name: Build Client
      run: cd decentralized-ai-marketplace/client && npm install && npm run build
